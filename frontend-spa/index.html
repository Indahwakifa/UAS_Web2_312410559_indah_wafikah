<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Inventory Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <div id="app">
        <nav class="bg-white shadow-md p-4 flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                📦 E-Inventory App
            </h1>
            <div class="flex gap-4 items-center">
                <router-link to="/" class="text-gray-600 hover:text-indigo-600 font-medium">Beranda</router-link>
                
                <router-link v-if="!isLoggedIn" to="/login" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 font-medium transition">
                    Login Admin
                </router-link>

                <span v-if="isLoggedIn" class="text-sm text-gray-500">Halo, <strong class="text-gray-700">{{ username }}</strong></span>
                <router-link v-if="isLoggedIn" to="/dashboard" class="text-gray-600 hover:text-indigo-600 font-medium">Dashboard</router-link>
                <button v-if="isLoggedIn" @click="handleLogout" class="bg-red-500 text-white px-4 py-2 rounded-md hover:bg-red-600 font-medium transition">
                    Logout
                </button>
            </div>
        </nav>

        <div class="container mx-auto px-4 max-w-6xl">
            <router-view></router-view>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
